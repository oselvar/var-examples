# Runs in the varar-dev/varar-examples repo, where examples/ is synced on every
# release of varar-dev/varar. In the monorepo this file is inert (GitHub only
# reads workflows from the repo root); the monorepo runs the projects against
# the local build via .github/workflows/*.yml instead.
name: java-junit-gradle

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, to catch bit-rot against the released Maven Central artifacts.
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-junit-gradle
    steps:
      - uses: actions/checkout@v7

      # The JDK version is never written here — it comes from the repo-root
      # .tool-versions, the same pin `make check` uses locally.
      - name: Toolchain pin
        id: pin
        run: |
          v=$(awk '/^java /{print $2; exit}' ../.tool-versions)
          echo "distribution=${v%%-*}" >> "$GITHUB_OUTPUT"
          echo "java=$(echo "${v#*-}" | cut -d. -f1)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v5
        with:
          distribution: ${{ steps.pin.outputs.distribution }}
          java-version: ${{ steps.pin.outputs.java }}

      - uses: gradle/actions/setup-gradle@v6

      - run: ./gradlew --console=plain test

# Runs in the varar-dev/varar-examples repo, where examples/ is synced on every
# release of varar-dev/varar. In the monorepo this file is inert (GitHub only
# reads workflows from the repo root); the monorepo runs the projects against
# the local build via .github/workflows/*.yml instead.
name: csharp-vstest

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, to catch bit-rot against the released pins.
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: csharp-vstest
    steps:
      - uses: actions/checkout@v7

      # The SDK version is never written here — it comes from the repo-root
      # .tool-versions, the same pin `make check` uses locally.
      - name: Toolchain pin
        id: pin
        run: echo "dotnet=$(awk '/^dotnet /{print $2; exit}' ../.tool-versions)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ steps.pin.outputs.dotnet }}

      - run: dotnet test
